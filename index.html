<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakAI">
<title>SpeakAI – English Speaking Coach</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --user-bubble: #6c63ff;
    --ai-bubble: #22222e;
    --radius: 18px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    color: var(--text);
    display: flex; flex-direction: column;
    height: 100dvh;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding-top: max(14px, env(safe-area-inset-top));
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .app-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .app-title { font-size: 1rem; font-weight: 700; }
  .app-sub { font-size: .72rem; color: var(--text2); }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text3); transition: background .3s;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .btn-icon {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2); border: none; color: var(--text2);
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:active { opacity: .7; }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 14px 8px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  /* ── MESSAGES ── */
  .msg-row { display: flex; gap: 8px; max-width: 100%; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; margin-top: 2px;
  }
  .msg-avatar.ai-av { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg-avatar.user-av { background: var(--surface2); font-size: 16px; }
  .msg-content { display: flex; flex-direction: column; gap: 4px; max-width: 78%; }
  .msg-row.user .msg-content { align-items: flex-end; }
  .bubble {
    padding: 11px 14px; border-radius: var(--radius);
    font-size: .92rem; line-height: 1.55; word-break: break-word;
  }
  .user .bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 5px;
  }
  .ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
  }
  .bubble.thinking {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text3);
    font-style: italic;
  }
  /* typing dots */
  .dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── CORRECTION CARD ── */
  .correction-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--yellow);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    font-size: .8rem;
    line-height: 1.5;
    margin-top: 2px;
  }
  .correction-card .cc-title {
    font-size: .7rem; text-transform: uppercase; letter-spacing: .5px;
    color: var(--yellow); font-weight: 700; margin-bottom: 5px;
    display: flex; align-items: center; gap: 5px;
  }
  .correction-card .cc-row { margin-bottom: 4px; }
  .correction-card .label { color: var(--text3); font-size: .75rem; }
  .correction-card .original { color: var(--red); text-decoration: line-through; }
  .correction-card .corrected { color: var(--green); font-weight: 600; }
  .correction-card .tip { color: var(--text2); font-style: italic; }
  .no-correction {
    font-size: .75rem; color: var(--green); font-style: italic; margin-top: 2px;
  }

  /* ── TRANSCRIPT ── */
  .transcript {
    font-size: .75rem; color: var(--text3); padding: 2px 4px;
    font-style: italic;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .text-input-wrap {
    flex: 1; background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 22px; padding: 10px 16px;
    display: flex; align-items: center; gap: 8px;
    transition: border-color .2s;
  }
  .text-input-wrap:focus-within { border-color: var(--accent); }
  .text-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: .92rem;
    font-family: inherit; resize: none;
    max-height: 100px; overflow-y: auto;
    line-height: 1.4;
  }
  .text-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: white; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .15s, opacity .15s;
  }
  .send-btn:active { transform: scale(.93); opacity: .8; }
  .send-btn:disabled { opacity: .35; }

  /* ── MIC BUTTON ── */
  .mic-btn {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text2); font-size: 19px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s; position: relative;
  }
  .mic-btn.listening {
    background: rgba(248,113,113,.15);
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}
    50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}
  }
  .mic-btn:active { transform: scale(.93); }

  /* ── HINT BAR ── */
  .hint-bar {
    display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px;
  }
  .hint-bar::-webkit-scrollbar { display: none; }
  .hint-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; padding: 5px 12px;
    font-size: .76rem; color: var(--text2); white-space: nowrap;
    cursor: pointer; flex-shrink: 0; transition: all .15s;
  }
  .hint-chip:active { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── MODE SELECTOR ── */
  .mode-bar {
    display: flex; gap: 6px; padding: 10px 14px 0;
    overflow-x: auto; flex-shrink: 0;
  }
  .mode-bar::-webkit-scrollbar { display: none; }
  .mode-chip {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 5px 13px;
    font-size: .78rem; color: var(--text2); white-space: nowrap;
    cursor: pointer; flex-shrink: 0; transition: all .2s; font-weight: 500;
  }
  .mode-chip.active {
    background: var(--accent); color: white; border-color: var(--accent);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 32px; text-align: center;
    color: var(--text3);
  }
  .empty-icon { font-size: 3rem; }
  .empty-title { font-size: 1.1rem; font-weight: 700; color: var(--text2); }
  .empty-sub { font-size: .85rem; line-height: 1.6; max-width: 280px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 18px;
    font-size: .82rem; color: var(--text2);
    opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="app-icon">🎙</div>
    <div>
      <div class="app-title">SpeakAI</div>
      <div class="app-sub">English Speaking Coach</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <button class="btn-icon" onclick="clearChat()" title="Clear chat">🗑</button>
    <button class="btn-icon" onclick="showKeyPrompt()" title="Change API key">🔑</button>
  </div>
</div>

<!-- MODE BAR -->
<div class="mode-bar" id="modeBar">
  <div class="mode-chip active" data-mode="freeChat" onclick="setMode(this)">💬 Free Chat</div>
  <div class="mode-chip" data-mode="interview" onclick="setMode(this)">👔 Job Interview</div>
  <div class="mode-chip" data-mode="design" onclick="setMode(this)">🎨 Design Talk</div>
  <div class="mode-chip" data-mode="grammar" onclick="setMode(this)">📝 Grammar Focus</div>
  <div class="mode-chip" data-mode="debate" onclick="setMode(this)">🔥 Debate</div>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎙️</div>
    <div class="empty-title">Ready to practise!</div>
    <div class="empty-sub">Tap the mic or type to start speaking. I'll reply naturally and help fix your English.</div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="hint-bar" id="hintBar"></div>
  <div class="input-row">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙</button>
    <div class="text-input-wrap">
      <textarea class="text-input" id="textInput" placeholder="Type or tap mic to speak…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendText()">↑</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const MODEL = 'gpt-4o';
let API_KEY = localStorage.getItem('speakai_key') || '';

// ── STATE ────────────────────────────────────────────────
let messages = [];
let isListening = false;
let isThinking = false;
let recognition = null;
let currentMode = 'freeChat';

// ── MODE CONFIGS ─────────────────────────────────────────
const modes = {
  freeChat: {
    label: 'Free Chat',
    systemPrompt: `You are a friendly, encouraging English speaking coach. The user is a Taiwanese Product Designer (B1-B2 level) practising English conversation. 

Your job:
1. Have a natural, engaging conversation on any topic
2. After your conversational reply, always add a "✏️ Feedback" section
3. In the Feedback section, point out 1-3 specific grammar or vocabulary improvements from what the user just said
4. Format feedback as JSON at the END of your message like this:
{"feedback":[{"original":"the sentence they said","corrected":"better version","tip":"brief explanation"}]}
5. If their English was perfect, use: {"feedback":"perfect"}
6. Keep your conversational reply warm, natural, under 3 sentences
7. Occasionally ask follow-up questions to keep them talking`,
    hints: ['Tell me about your day 🌞', 'What are your weekend plans?', 'Recommend a movie 🎬', 'What do you think about AI?', 'Describe your hometown 🏙️']
  },
  interview: {
    label: 'Job Interview',
    systemPrompt: `You are a senior hiring manager at a top tech company (like Google, Meta, Figma) interviewing for a Staff Product Designer role. The candidate is Taiwanese with B1-B2 English.

Your job:
1. Ask realistic interview questions one at a time
2. React naturally to their answer (follow up, probe deeper, or move on)
3. After each reply, add feedback JSON at the END:
{"feedback":[{"original":"what they said","corrected":"better professional phrasing","tip":"why this phrasing works better in interviews"}]}
4. Focus feedback on: professional vocabulary, confidence phrases, STAR structure
5. Be professional but encouraging
6. If perfect: {"feedback":"perfect"}`,
    hints: ['Tell me about yourself', 'Walk me through your portfolio', 'How do you handle stakeholder conflict?', 'Describe a design failure', 'Why do you want to join us?']
  },
  design: {
    label: 'Design Talk',
    systemPrompt: `You are a fellow senior Product Designer at a top tech company. You love talking about UX, design systems, product thinking, and the industry. The user is a Taiwanese designer practising English.

Your job:
1. Have an engaged design conversation — share opinions, ask for theirs
2. Use real design vocabulary naturally in your replies
3. After your reply, add feedback JSON at END:
{"feedback":[{"original":"their phrase","corrected":"better UX vocabulary","tip":"explanation"}]}
4. Teach them professional design English through natural conversation
5. Topics: design systems, user research, critique, career, tools, trends
6. If perfect: {"feedback":"perfect"}`,
    hints: ['What's your design process?', 'Thoughts on design systems?', 'How do you do user research?', 'Figma vs other tools?', 'How do you present to stakeholders?']
  },
  grammar: {
    label: 'Grammar Focus',
    systemPrompt: `You are a patient English grammar coach. The user is practising speaking with a focus on grammar accuracy.

Your job:
1. Reply conversationally, naturally
2. After your reply, give DETAILED grammar feedback as JSON at END:
{"feedback":[{"original":"exact phrase","corrected":"correct version","tip":"grammar rule explanation"}]}
3. Point out ALL grammar issues, not just 1-3
4. Explain WHY it's wrong with simple grammar rules
5. Be encouraging — mistakes are normal at this level
6. If perfect: {"feedback":"perfect"}`,
    hints: ['Practice: I have been to...', 'Practice: used to / would', 'Practice: present perfect', 'Practice: conditionals', 'Practice: passive voice']
  },
  debate: {
    label: 'Debate',
    systemPrompt: `You are a debate partner helping the user practise persuasive English speaking. Take an opposing view and argue it respectfully.

Your job:
1. Take the opposite side and argue it with logic and evidence
2. Challenge their reasoning, ask for more support
3. After your reply, add feedback JSON at END:
{"feedback":[{"original":"their phrase","corrected":"more persuasive/formal version","tip":"why this is more convincing"}]}
4. Focus feedback on: persuasive language, hedging, emphasis, formal vocabulary
5. Keep the debate lively but friendly
6. If perfect: {"feedback":"perfect"}`,
    hints: ['AI will replace designers', 'Remote work is better', 'UX research is overrated', 'Design systems kill creativity', 'Social media does more harm than good']
  }
};

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  setMode(document.querySelector('.mode-chip.active'));
  setupRecognition();
  if (!API_KEY) {
    showKeyPrompt();
  } else {
    document.getElementById('statusDot').classList.add('online');
  }
});

function showKeyPrompt() {
  const overlay = document.createElement('div');
  overlay.id = 'keyOverlay';
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;
    display:flex;align-items:center;justify-content:center;padding:24px`;
  overlay.innerHTML = \`
    <div style="background:#1a1a24;border:1px solid #2e2e3e;border-radius:18px;padding:28px 24px;max-width:340px;width:100%">
      <div style="font-size:1.8rem;text-align:center;margin-bottom:12px">🔑</div>
      <div style="font-size:1rem;font-weight:700;margin-bottom:6px;color:#f0f0f5">Enter your OpenAI API Key</div>
      <div style="font-size:.82rem;color:#9090a8;margin-bottom:16px;line-height:1.5">
        Your key is saved only on this device (localStorage). Never uploaded anywhere.
      </div>
      <input id="keyInput" type="password" placeholder="sk-proj-..." 
        style="width:100%;background:#22222e;border:1.5px solid #2e2e3e;border-radius:10px;
        padding:11px 14px;color:#f0f0f5;font-size:.9rem;outline:none;margin-bottom:12px;
        font-family:monospace">
      <button onclick="saveKey()" 
        style="width:100%;background:linear-gradient(135deg,#6c63ff,#a78bfa);border:none;
        border-radius:10px;padding:12px;color:white;font-size:.95rem;font-weight:700;cursor:pointer">
        Save & Start
      </button>
      <div style="font-size:.75rem;color:#5a5a72;text-align:center;margin-top:10px">
        Get your key at platform.openai.com
      </div>
    </div>\`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('keyInput').focus(), 100);
}

function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('sk-')) { 
    alert('Please enter a valid OpenAI API key (starts with sk-)');
    return;
  }
  API_KEY = k;
  localStorage.setItem('speakai_key', k);
  document.getElementById('keyOverlay').remove();
  document.getElementById('statusDot').classList.add('online');
}

function setMode(el) {
  document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMode = el.dataset.mode;
  const mode = modes[currentMode];
  // update hints
  const hintBar = document.getElementById('hintBar');
  hintBar.innerHTML = mode.hints.map(h =>
    `<div class="hint-chip" onclick="useHint(this)">${h}</div>`
  ).join('');
  // reset messages (keep system prompt fresh)
  messages = [];
}

function useHint(el) {
  document.getElementById('textInput').value = el.textContent;
  autoResize(document.getElementById('textInput'));
  document.getElementById('textInput').focus();
}

// ── SPEECH RECOGNITION ───────────────────────────────────
function buildRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'en-US';
  r.interimResults = true;
  r.continuous = false;
  r.onresult = (e) => {
    let interim = '', final = '';
    for (let res of e.results) {
      if (res.isFinal) final += res[0].transcript;
      else interim += res[0].transcript;
    }
    document.getElementById('textInput').value = final || interim;
    autoResize(document.getElementById('textInput'));
  };
  r.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').innerHTML = '🎙';
    const val = document.getElementById('textInput').value.trim();
    if (val) sendText();
  };
  r.onerror = (e) => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').innerHTML = '🎙';
    if (e.error === 'not-allowed') {
      showToast('❌ Mic permission denied — check Safari Settings > Websites > Microphone');
    } else if (e.error !== 'no-speech') {
      showToast('Mic error: ' + e.error);
    }
  };
  return r;
}

function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Speech not supported — use Safari on iOS');
    document.getElementById('micBtn').style.opacity = '0.4';
  }
}

async function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Use Safari on iPhone for mic support'); return; }

  if (isListening) {
    if (recognition) recognition.stop();
    return;
  }

  // iOS Safari requires getUserMedia first to trigger mic permission popup
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // Permission granted — stop the stream immediately, we only needed the prompt
    stream.getTracks().forEach(t => t.stop());
  } catch (err) {
    showToast('❌ Mic access denied — go to Settings > Safari > Microphone → Allow');
    return;
  }

  // Now start speech recognition
  recognition = buildRecognition();
  if (!recognition) { showToast('Speech recognition not available'); return; }

  isListening = true;
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micBtn').innerHTML = '⏹';
  document.getElementById('textInput').value = '';
  try {
    recognition.start();
    showToast('🎙 Listening… tap ⏹ to stop');
  } catch(e) {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').innerHTML = '🎙';
    showToast('Could not start mic: ' + e.message);
  }
}

// ── SEND MESSAGE ─────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || isThinking) return;

  input.value = '';
  autoResize(input);
  hideEmpty();

  // Add user message
  addUserBubble(text);
  messages.push({ role: 'user', content: text });

  // Show thinking
  const thinkId = addThinkingBubble();
  isThinking = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const systemMsg = { role: 'system', content: modes[currentMode].systemPrompt };
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [systemMsg, ...messages],
        temperature: 0.8,
        max_tokens: 600
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await response.json();
    const fullReply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: fullReply });

    removeThinking(thinkId);
    renderAIReply(fullReply);

  } catch (err) {
    removeThinking(thinkId);
    addErrorBubble(err.message);
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  scrollBottom();
}

// ── RENDER AI REPLY ───────────────────────────────────────
function renderAIReply(fullReply) {
  // Extract JSON feedback from end of reply
  const jsonMatch = fullReply.match(/\{[\s\S]*"feedback"[\s\S]*\}\s*$/);
  let conversationalPart = fullReply;
  let feedbackData = null;

  if (jsonMatch) {
    try {
      feedbackData = JSON.parse(jsonMatch[0]);
      conversationalPart = fullReply.slice(0, fullReply.lastIndexOf(jsonMatch[0])).trim();
      // Remove any "Feedback:" label lines before the JSON
      conversationalPart = conversationalPart.replace(/✏️\s*Feedback[\s\S]*$/i, '').trim();
    } catch(e) { /* parse failed, show as-is */ }
  }

  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="msg-avatar ai-av">🤖</div>
    <div class="msg-content">
      <div class="bubble">${escHtml(conversationalPart)}</div>
      ${renderFeedback(feedbackData)}
    </div>`;
  document.getElementById('chatArea').appendChild(row);
  scrollBottom();
}

function renderFeedback(data) {
  if (!data) return '';
  if (data.feedback === 'perfect') {
    return `<div class="no-correction">✅ Great English! No corrections needed.</div>`;
  }
  if (!Array.isArray(data.feedback) || data.feedback.length === 0) return '';

  let html = `<div class="correction-card">
    <div class="cc-title">✏️ Feedback</div>`;
  data.feedback.forEach(f => {
    html += `<div class="cc-row">
      <span class="original">${escHtml(f.original || '')}</span>
      → <span class="corrected">${escHtml(f.corrected || '')}</span>
      <br><span class="tip">💡 ${escHtml(f.tip || '')}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ── BUBBLE HELPERS ────────────────────────────────────────
function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-avatar user-av">😊</div>
    <div class="msg-content">
      <div class="bubble">${escHtml(text)}</div>
    </div>`;
  document.getElementById('chatArea').appendChild(row);
  scrollBottom();
}

function addThinkingBubble() {
  const id = 'think-' + Date.now();
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = id;
  row.innerHTML = `
    <div class="msg-avatar ai-av">🤖</div>
    <div class="msg-content">
      <div class="bubble thinking">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  document.getElementById('chatArea').appendChild(row);
  scrollBottom();
  return id;
}

function removeThinking(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function addErrorBubble(msg) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="msg-avatar ai-av">🤖</div>
    <div class="msg-content">
      <div class="bubble" style="border-color:var(--red);color:var(--red)">
        ⚠️ Error: ${escHtml(msg)}<br><small>Check your API key or internet connection.</small>
      </div>
    </div>`;
  document.getElementById('chatArea').appendChild(row);
  scrollBottom();
}

function hideEmpty() {
  const e = document.getElementById('emptyState');
  if (e) e.remove();
}

function clearChat() {
  messages = [];
  const ca = document.getElementById('chatArea');
  ca.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="empty-icon">🎙️</div>
    <div class="empty-title">Ready to practise!</div>
    <div class="empty-sub">Tap the mic or type to start speaking. I'll reply naturally and help fix your English.</div>
  </div>`;
  showToast('Chat cleared');
}

function scrollBottom() {
  const ca = document.getElementById('chatArea');
  setTimeout(() => ca.scrollTo({ top: ca.scrollHeight, behavior: 'smooth' }), 50);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
