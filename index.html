<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakAI">
<title>SpeakAI</title>
<style>
:root{--bg:#0f0f13;--s1:#1a1a24;--s2:#22222e;--bd:#2e2e3e;--ac:#6c63ff;--ac2:#a78bfa;--gr:#34d399;--rd:#f87171;--yl:#fbbf24;--bl:#60a5fa;--tx:#f0f0f5;--t2:#9090a8;--t3:#5a5a72}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;color:var(--tx);display:flex;flex-direction:column;height:100dvh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;padding-top:max(14px,env(safe-area-inset-top));background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:18px}
.app-t{font-size:1rem;font-weight:700}
.app-s{font-size:.72rem;color:var(--t2)}
.hdr-r{display:flex;gap:8px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--t3);transition:background .3s}
.dot.on{background:var(--gr);box-shadow:0 0 6px var(--gr)}
.ibtn{width:34px;height:34px;border-radius:50%;background:var(--s2);border:none;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ibtn:active{opacity:.7}
.modebar{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;flex-shrink:0}
.modebar::-webkit-scrollbar{display:none}
.mc{background:var(--s2);border:1.5px solid var(--bd);border-radius:16px;padding:5px 13px;font-size:.78rem;color:var(--t2);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .2s;font-weight:500}
.mc.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px 8px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{display:none}
.row{display:flex;gap:8px;max-width:100%}
.row.u{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px}
.av.ai{background:linear-gradient(135deg,var(--ac),var(--ac2))}
.av.me{background:var(--s2);font-size:16px}
.mc2{display:flex;flex-direction:column;gap:4px;max-width:82%}
.row.u .mc2{align-items:flex-end}
.bub{padding:11px 14px;border-radius:18px;font-size:.92rem;line-height:1.55;word-break:break-word}
.u .bub{background:var(--ac);color:#fff;border-bottom-right-radius:5px}
.ai .bub{background:var(--s2);border:1px solid var(--bd);border-bottom-left-radius:5px}
.bub.think{background:var(--s2);border:1px solid var(--bd);color:var(--t3);font-style:italic}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--t3);margin:0 2px;animation:bnc 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── FEEDBACK CARD (under user message) ── */
.fb-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-top:4px;width:100%;text-align:left}
.fb-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.fb-badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
.fb-badge.grammar{background:rgba(248,113,113,.15);color:var(--rd)}
.fb-badge.vocab{background:rgba(96,165,250,.15);color:var(--bl)}
.fb-badge.phrasing{background:rgba(251,191,36,.15);color:var(--yl)}
.fb-badge.natural{background:rgba(52,211,153,.15);color:var(--gr)}
.fb-item{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.fb-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.fb-original{font-size:.85rem;color:var(--rd);text-decoration:line-through;margin-bottom:2px}
.fb-arrow{color:var(--t3);font-size:.75rem;margin:0 2px}
.fb-corrected{font-size:.85rem;color:var(--gr);font-weight:600}
.fb-explanation{font-size:.78rem;color:var(--t2);margin-top:4px;line-height:1.5}
.fb-perfect{font-size:.85rem;color:var(--gr);font-weight:600;text-align:center;padding:6px 0}
.fb-summary{font-size:.72rem;color:var(--t3);margin-top:6px;text-align:right}

.bot{flex-shrink:0;background:var(--bg);border-top:1px solid var(--bd);padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.hints{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.hints::-webkit-scrollbar{display:none}
.hc{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:5px 12px;font-size:.76rem;color:var(--t2);white-space:nowrap;cursor:pointer;flex-shrink:0}
.hc:active{background:var(--ac);color:#fff}
.irow{display:flex;gap:10px;align-items:flex-end}
.iwrap{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:22px;padding:10px 16px;display:flex;align-items:center;transition:border-color .2s}
.iwrap:focus-within{border-color:var(--ac)}
textarea{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:.92rem;font-family:inherit;resize:none;max-height:100px;overflow-y:auto;line-height:1.4}
textarea::placeholder{color:var(--t3)}
.sbtn{width:42px;height:42px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s}
.sbtn:active{transform:scale(.93);opacity:.8}
.sbtn:disabled{opacity:.35}
.mic{width:42px;height:42px;border-radius:50%;flex-shrink:0;background:var(--s2);border:1.5px solid var(--bd);color:var(--t2);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic.on{background:rgba(248,113,113,.15);border-color:var(--rd);color:var(--rd);animation:pls 1.2s infinite}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;text-align:center;color:var(--t3);flex:1}
.empty-i{font-size:3rem}
.empty-t{font-size:1.1rem;font-weight:700;color:var(--t2)}
.empty-s{font-size:.85rem;line-height:1.6;max-width:280px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:8px 18px;font-size:.82rem;color:var(--t2);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.key-box{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:28px 24px;max-width:340px;width:100%}
.key-box h2{font-size:1rem;font-weight:700;margin-bottom:6px;color:var(--tx)}
.key-box p{font-size:.82rem;color:var(--t2);margin-bottom:16px;line-height:1.5}
.key-box input{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:.9rem;outline:none;margin-bottom:12px;font-family:monospace}
.key-box button{width:100%;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:10px;padding:12px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer}
.key-box small{display:block;font-size:.75rem;color:var(--t3);text-align:center;margin-top:10px}
.rec-indicator{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:998;text-align:center;pointer-events:none}
.rec-indicator .rec-circle{width:80px;height:80px;border-radius:50%;background:rgba(248,113,113,.2);border:3px solid var(--rd);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px;animation:pls 1.2s infinite}
.rec-indicator .rec-text{color:var(--rd);font-size:.85rem;font-weight:600}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <div class="icon">&#127897;</div>
    <div><div class="app-t">SpeakAI</div><div class="app-s">English Speaking Coach</div></div>
  </div>
  <div class="hdr-r">
    <div class="dot" id="dot"></div>
    <button class="ibtn" onclick="clearChat()">&#128465;</button>
    <button class="ibtn" onclick="showKey()">&#128273;</button>
  </div>
</div>
<div class="modebar" id="modebar">
  <div class="mc active" data-m="free" onclick="setMode(this)">&#128172; Free Chat</div>
  <div class="mc" data-m="interview" onclick="setMode(this)">&#128084; Interview</div>
  <div class="mc" data-m="design" onclick="setMode(this)">&#127912; Design Talk</div>
  <div class="mc" data-m="grammar" onclick="setMode(this)">&#128221; Grammar</div>
  <div class="mc" data-m="debate" onclick="setMode(this)">&#128293; Debate</div>
</div>
<div class="chat" id="chat">
  <div class="empty" id="empty">
    <div class="empty-i">&#127897;</div>
    <div class="empty-t">Ready to practise!</div>
    <div class="empty-s">Tap the mic to record, or type. I will reply and correct your English.</div>
  </div>
</div>
<div class="bot">
  <div class="hints" id="hints"></div>
  <div class="irow">
    <button class="mic" id="micBtn" onclick="toggleMic()">&#127897;</button>
    <div class="iwrap">
      <textarea id="ti" placeholder="Type or tap mic..." rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    </div>
    <button class="sbtn" id="sb" onclick="send()">&#8593;</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var MODEL = "gpt-4o";
var apiKey = localStorage.getItem("sk") || "";
var msgs = [];
var listening = false;
var thinking = false;
var mode = "free";
var mediaRecorder = null;
var audioChunks = [];
var recStream = null;
var micPermissionGranted = false;
var pendingUserRow = null;

var MODES = {
  free: {
    hints: ["Tell me about your day", "What are your weekend plans?", "Recommend a movie", "What do you think about AI?", "Describe your hometown"],
    sys: 'You are a friendly English speaking coach for a Taiwanese Product Designer (B1-B2 level). Have a natural conversation. You MUST analyze the user message for grammar, vocabulary, and phrasing errors. Always respond with JSON.\n\nReturn EXACTLY this format:\n{"reply":"Your natural conversational reply (2-3 sentences, ask a follow-up question)","feedback":[{"type":"grammar|vocabulary|phrasing|natural","original":"the exact wrong phrase from user","correction":"the correct/better version","explanation":"simple explanation of why"}]}\n\nIf the user English is perfect, use: {"reply":"...","feedback":[]}\n\nRules:\n- "type" must be one of: grammar, vocabulary, phrasing, natural\n- "original" must be the EXACT words the user said (not paraphrased)\n- "correction" is the fixed version\n- "explanation" is a short, clear reason (1 sentence)\n- Pick 1-4 most important errors (not every tiny mistake)\n- "natural" type = suggest a more native/natural way to say something even if technically correct'
  },
  interview: {
    hints: ["Tell me about yourself", "Walk me through your portfolio", "How do you handle conflict?", "Describe a design failure", "Why do you want this role?"],
    sys: 'You are a hiring manager interviewing for a Staff Product Designer role at a top tech company. The candidate is Taiwanese (B1-B2 English). Ask one question at a time, react naturally. You MUST respond with JSON.\n\nReturn EXACTLY:\n{"reply":"Your response + next question","feedback":[{"type":"grammar|vocabulary|phrasing|natural","original":"exact wrong phrase","correction":"better professional version","explanation":"why this is better for interviews"}]}\n\nIf perfect: {"reply":"...","feedback":[]}\n\nFocus feedback on: professional vocabulary, confident phrasing, STAR structure, interview-appropriate language.'
  },
  design: {
    hints: ["What is your design process?", "Thoughts on design systems?", "How do you do user research?", "Figma vs other tools?", "How do you present to stakeholders?"],
    sys: 'You are a senior Product Designer chatting with a peer. Discuss UX, design systems, product thinking. You MUST respond with JSON.\n\nReturn EXACTLY:\n{"reply":"Your response with design vocabulary","feedback":[{"type":"grammar|vocabulary|phrasing|natural","original":"exact wrong phrase","correction":"better UX/design term","explanation":"why"}]}\n\nIf perfect: {"reply":"...","feedback":[]}\n\nTeach professional design English through corrections and natural usage.'
  },
  grammar: {
    hints: ["I have been to many places", "I used to work on mobile apps", "If I had more time I would...", "The design was made by me", "I am working here since 2020"],
    sys: 'You are a strict grammar coach. Reply conversationally. You MUST respond with JSON and list ALL grammar errors.\n\nReturn EXACTLY:\n{"reply":"Conversational reply","feedback":[{"type":"grammar|vocabulary|phrasing|natural","original":"exact wrong phrase","correction":"correct version","explanation":"grammar rule explanation"}]}\n\nIf perfect: {"reply":"...","feedback":[]}\n\nPoint out EVERY error. Explain the grammar rule clearly.'
  },
  debate: {
    hints: ["AI will replace designers", "Remote work is better", "UX research is overrated", "Design systems kill creativity", "Social media does more harm than good"],
    sys: 'You are a debate partner. Take the opposing view. You MUST respond with JSON.\n\nReturn EXACTLY:\n{"reply":"Your counter-argument","feedback":[{"type":"grammar|vocabulary|phrasing|natural","original":"exact wrong phrase","correction":"more persuasive/formal version","explanation":"why"}]}\n\nIf perfect: {"reply":"...","feedback":[]}\n\nFocus on: persuasive language, hedging, emphasis, formal vocabulary.'
  }
};

window.onload = function() {
  setMode(document.querySelector(".mc.active"));
  if (!apiKey) { showKey(); } else { document.getElementById("dot").className = "dot on"; }
};

function setMode(el) {
  document.querySelectorAll(".mc").forEach(function(c){ c.classList.remove("active"); });
  el.classList.add("active");
  mode = el.getAttribute("data-m");
  var h = document.getElementById("hints");
  h.innerHTML = MODES[mode].hints.map(function(t){
    return '<div class="hc" onclick="useHint(this)">' + t + "</div>";
  }).join("");
  msgs = [];
}

function useHint(el) {
  document.getElementById("ti").value = el.textContent;
  resize(document.getElementById("ti"));
}

function showKey() {
  var old = document.getElementById("overlay");
  if (old) old.remove();
  var d = document.createElement("div");
  d.className = "overlay"; d.id = "overlay";
  d.innerHTML = '<div class="key-box"><div style="font-size:1.8rem;text-align:center;margin-bottom:12px">&#128273;</div><h2>OpenAI API Key</h2><p>Saved only on this device. Never sent anywhere except OpenAI.</p><input id="ki" type="password" placeholder="sk-proj-..." /><button onclick="saveKey()">Save &amp; Start</button><small>Get your key at platform.openai.com</small></div>';
  document.body.appendChild(d);
  setTimeout(function(){ var ki = document.getElementById("ki"); if(ki) ki.focus(); }, 200);
}

function saveKey() {
  var k = document.getElementById("ki") ? document.getElementById("ki").value.trim() : "";
  if (!k.startsWith("sk-")) { alert("Please enter a valid key starting with sk-"); return; }
  apiKey = k;
  localStorage.setItem("sk", k);
  var o = document.getElementById("overlay");
  if (o) o.remove();
  document.getElementById("dot").className = "dot on";
}

// ── MIC: MediaRecorder + Whisper API ─────────────────────
function toggleMic() {
  if (!apiKey) { showKey(); return; }
  if (listening) { stopRecording(); return; }
  startRecording();
}

function startRecording() {
  function beginRec(stream) {
    recStream = stream;
    micPermissionGranted = true;
    audioChunks = [];
    var mimeType = "audio/mp4";
    if (!MediaRecorder.isTypeSupported(mimeType)) { mimeType = "audio/webm"; }
    if (!MediaRecorder.isTypeSupported(mimeType)) { mimeType = ""; }
    try {
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);
    } catch(e) {
      toast("Recording not supported");
      return;
    }
    mediaRecorder.ondataavailable = function(e) {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onstop = function() {
      var audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
      transcribeAudio(audioBlob);
    };
    mediaRecorder.start();
    listening = true;
    document.getElementById("micBtn").className = "mic on";
    document.getElementById("micBtn").innerHTML = "&#9209;";
    showRecIndicator();
  }
  if (micPermissionGranted && recStream) {
    beginRec(recStream);
  } else {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      beginRec(stream);
    }).catch(function() {
      toast("Mic denied - check Settings > Safari > Microphone");
    });
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.stop(); }
  listening = false;
  document.getElementById("micBtn").className = "mic";
  document.getElementById("micBtn").innerHTML = "&#127897;";
  hideRecIndicator();
}

function showRecIndicator() {
  var old = document.getElementById("recInd");
  if (old) old.remove();
  var d = document.createElement("div");
  d.className = "rec-indicator"; d.id = "recInd";
  d.innerHTML = '<div class="rec-circle">&#127897;</div><div class="rec-text">Recording...</div>';
  document.body.appendChild(d);
}

function hideRecIndicator() {
  var el = document.getElementById("recInd");
  if (el) el.remove();
}

function transcribeAudio(blob) {
  if (blob.size < 100) { toast("Audio too short"); return; }
  toast("Transcribing...");
  var formData = new FormData();
  formData.append("file", blob, "audio.webm");
  formData.append("model", "whisper-1");
  formData.append("language", "en");
  fetch("https://api.openai.com/v1/audio/transcriptions", {
    method: "POST",
    headers: { "Authorization": "Bearer " + apiKey },
    body: formData
  }).then(function(res) {
    if (!res.ok) return res.json().then(function(d){ throw new Error(d.error ? d.error.message : "Whisper error"); });
    return res.json();
  }).then(function(data) {
    var text = data.text.trim();
    if (text) {
      document.getElementById("ti").value = text;
      resize(document.getElementById("ti"));
      send();
    } else {
      toast("Could not hear you - try again");
    }
  }).catch(function(err) {
    toast("Transcription error: " + err.message);
  });
}

// ── SEND ─────────────────────────────────────────────────
function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 100) + "px"; }

function send() {
  var text = document.getElementById("ti").value.trim();
  if (!text || thinking) return;
  if (!apiKey) { showKey(); return; }
  document.getElementById("ti").value = "";
  resize(document.getElementById("ti"));
  var e = document.getElementById("empty");
  if (e) e.remove();

  // Add user bubble — save reference so we can attach feedback later
  pendingUserRow = addUserBubble(text);
  msgs.push({ role: "user", content: text });

  var tid = addThink();
  thinking = true;
  document.getElementById("sb").disabled = true;

  // Use JSON mode for reliable structured output
  var body = JSON.stringify({
    model: MODEL,
    messages: [{ role: "system", content: MODES[mode].sys }].concat(msgs),
    temperature: 0.7,
    max_tokens: 800,
    response_format: { type: "json_object" }
  });

  fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: body
  }).then(function(res) {
    if (!res.ok) return res.json().then(function(d){ throw new Error(d.error ? d.error.message : "API error"); });
    return res.json();
  }).then(function(data) {
    var raw = data.choices[0].message.content;
    msgs.push({ role: "assistant", content: raw });
    removeThink(tid);

    // Parse structured JSON response
    var parsed = null;
    try { parsed = JSON.parse(raw); } catch(e) {}

    if (parsed && parsed.reply) {
      // 1. Add AI reply bubble
      addAIBubble(parsed.reply);
      // 2. Attach feedback to user's message
      if (pendingUserRow) {
        attachFeedback(pendingUserRow, parsed.feedback || []);
        pendingUserRow = null;
      }
    } else {
      // Fallback: show raw text
      addAIBubble(raw);
    }
  }).catch(function(err) {
    removeThink(tid);
    addAIBubble("Error: " + err.message);
  }).finally(function() {
    thinking = false;
    document.getElementById("sb").disabled = false;
    scrollBot();
  });
}

// ── BUBBLE HELPERS ───────────────────────────────────────
function addUserBubble(text) {
  var row = document.createElement("div");
  row.className = "row u";
  row.innerHTML = '<div class="mc2"><div class="bub">' + esc(text) + '</div><div class="fb-container"></div></div><div class="av me">&#128522;</div>';
  document.getElementById("chat").appendChild(row);
  scrollBot();
  return row;
}

function addAIBubble(text) {
  var row = document.createElement("div");
  row.className = "row ai";
  row.innerHTML = '<div class="av ai">&#129302;</div><div class="mc2"><div class="bub">' + esc(text) + "</div></div>";
  document.getElementById("chat").appendChild(row);
  scrollBot();
}

function attachFeedback(userRow, feedback) {
  var container = userRow.querySelector(".fb-container");
  if (!container) return;

  if (feedback.length === 0) {
    container.innerHTML = '<div class="fb-perfect">&#10003; Perfect English! No corrections needed.</div>';
    return;
  }

  var html = '<div class="fb-card">';
  html += '<div class="fb-header"><span style="font-size:.78rem;font-weight:700;color:var(--yl)">&#9997; Corrections (' + feedback.length + ')</span></div>';

  feedback.forEach(function(item) {
    var typeClass = item.type || "grammar";
    var typeLabel = item.type || "grammar";
    html += '<div class="fb-item">';
    html += '<span class="fb-badge ' + typeClass + '">' + typeLabel + "</span>";
    html += '<div style="margin-top:6px"><span class="fb-original">' + esc(item.original || "") + '</span></div>';
    html += '<div><span class="fb-arrow">&#8594;</span> <span class="fb-corrected">' + esc(item.correction || "") + '</span></div>';
    if (item.explanation) {
      html += '<div class="fb-explanation">&#128161; ' + esc(item.explanation) + "</div>";
    }
    html += "</div>";
  });

  html += "</div>";
  container.innerHTML = html;
  scrollBot();
}

function addThink() {
  var id = "tk" + Date.now();
  var row = document.createElement("div");
  row.className = "row ai"; row.id = id;
  row.innerHTML = '<div class="av ai">&#129302;</div><div class="mc2"><div class="bub think"><div class="dots"><span></span><span></span><span></span></div></div></div>';
  document.getElementById("chat").appendChild(row);
  scrollBot();
  return id;
}

function removeThink(id) { var el = document.getElementById(id); if (el) el.remove(); }

function clearChat() {
  msgs = [];
  pendingUserRow = null;
  document.getElementById("chat").innerHTML = '<div class="empty" id="empty"><div class="empty-i">&#127897;</div><div class="empty-t">Ready to practise!</div><div class="empty-s">Tap the mic to record, or type.</div></div>';
  toast("Chat cleared");
}

function scrollBot() { var c = document.getElementById("chat"); setTimeout(function(){ c.scrollTop = c.scrollHeight; }, 50); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }
function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast on";
  setTimeout(function(){ t.className = "toast"; }, 3000);
}
</script>
</body>
</html>
